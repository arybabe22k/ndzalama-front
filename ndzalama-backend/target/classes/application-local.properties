# ========================================
# SERVER CONFIGURATION
# ========================================

# Application server port
server.port=8081


# ========================================
# DATABASE CONFIGURATION
# ========================================

# PostgreSQL database connection URL
spring.datasource.url=jdbc:postgresql://localhost:5432/ndzalama

# Database username
spring.datasource.username=postgres

# Database password
spring.datasource.password=postgres


# ========================================
# JPA / HIBERNATE CONFIGURATION
# ========================================

# Automatically updates database tables
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in console
spring.jpa.show-sql=true

# Formats SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true


# ========================================
# JWT CONFIGURATION
# ========================================

# Secret key used to sign JWT tokens
jwt.secret=ndzalama-super-secret-key-very-secure-2026

# Access token expiration time (30 minutes)
jwt.access-expiration=1800000

# Refresh token expiration time (7 days)
jwt.refresh-expiration=604800000